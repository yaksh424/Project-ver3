<!DOCTYPE html>

  <main>
    <section class="section">

              <input type="password" name="password" required>

          <p style="margin-top: 1rem; color: #555;">Тестовый пользователь: <strong>harry@hogwarts.ru</strong> / <strong>magic123</strong></p>
