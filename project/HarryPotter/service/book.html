<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись на мастер-класс - Лавка у Оливандера</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); background-attachment: fixed; }
    .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 16px; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
    .form-group textarea { resize: vertical; min-height: 100px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo"><h1>🪄 Лавка у Оливандера</h1></div>
      <nav class="nav">
        <ul>
          <li><a href="/index.html">Главная</a></li>
          <li><a href="/catalog/">Каталог</a></li>
          <li><a href="/service/book.html">Сервис</a></li>
          <li><a href="/cart.html">Корзина</a></li>
          <li><a href="/login.html">Войти</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2 class="section-title">✨ Запись на мастер-класс</h2>
        <p style="text-align:center; max-width: 760px; margin: 0 auto 2rem; color: #4c4c73;">Выберите удобную дату и формат мероприятия. Мы подготовим всё необходимое, чтобы ваше занятие выглядело как настоящее волшебное событие.</p>

        <div class="form-container">
          <form action="booking" method="POST">
            <div class="form-group">
              <label>ФИО</label>
              <input type="text" name="name" required>
            </div>
            <div class="form-group">
              <label>Телефон</label>
              <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" required>
            </div>
            <div class="form-group">
              <label>Тип события</label>
              <select name="serviceType" required>
                <option>Мастер-класс по выбору палочки</option>
                <option>Индивидуальная консультация</option>
                <option>Подарочная упаковка</option>
              </select>
            </div>
            <div class="form-group">
              <label>Дата и время</label>
              <input type="datetime-local" name="date" required>
            </div>
            <div class="form-group">
              <label>Комментарий</label>
              <textarea name="description"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Записаться</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 Лавка у Оливандера. Все права защищены.</p>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>
