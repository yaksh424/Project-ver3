<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Заказы — Админ</title>
	<link rel="stylesheet" href="../assets/css/style.css">
	<style>
		.order { background: white; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
	</style>
</head>
<body>
	<header class="header"><div class="header-content"><div class="logo"><h1>🪄 Лавка — Заказы</h1></div></div></header>
	<main>
		<section class="section">
			<div class="container">
				<h2>Список заказов</h2>
				<div id="orders"></div>
			</div>
		</section>
	</main>
	<script>
		async function load() {
			const res = await fetch('/api/orders');
			const data = await res.json();
			const el = document.getElementById('orders');
			if (!data.length) el.innerHTML = '<p>Заказов пока нет.</p>';
			el.innerHTML = data.map(o => `<div class=\"order\"><strong>#${o.id} ${o.productName}</strong><div>${o.name} — ${o.phone} — ${o.email}</div><div>Кол-во: ${o.quantity} — Сумма: ${o.total} ₽</div></div>`).join('');
		}
		load();
	</script>
</body>
</html>
