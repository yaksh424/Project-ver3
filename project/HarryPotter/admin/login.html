<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Админ — Лавка у Оливандера</title>
	<link rel="stylesheet" href="../assets/css/style.css">
	<style>
		.login-box { max-width: 420px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 12px; }
		.form-group { margin-bottom: 1rem; }
	</style>
</head>
<body>
	<header class="header"><div class="header-content"><div class="logo"><h1>🪄 Лавка — Админ</h1></div></div></header>
	<main>
		<section class="section">
			<div class="container">
				<div class="login-box">
					<h2>Вход в админку</h2>
					<p>Это упрощённая админ-панель для учебного проекта.</p>
					<div class="form-group">
						<label>Логин</label>
						<input type="text" id="login" />
					</div>
					<div class="form-group">
						<label>Пароль</label>
						<input type="password" id="password" />
					</div>
					<button class="btn btn-primary" onclick="location.href='catalog-manage.html'">Войти</button>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
